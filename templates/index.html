<!doctype html>
<html>
    <head>
        <title>AI Bird Dashboard</title>
        <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link rel="stylesheet" href="/static/css/style.css" />
    </head>
    <body>
        <div class="dashboard">
            <div class="game-section">
                <canvas id="gameCanvas" width="400" height="600"></canvas>
                <div class="mini-stats">
                    <span>Juego: <b id="game_number">0</b></span>
                    <span>Score: <b id="score">0</b></span>
                    <span>Max IA: <b id="max_score">0</b></span>
                    <span
                        >Max Humano:
                        <b id="max_human" style="color: #60a5fa">0</b></span
                    >
                    <span>Q-Size: <b id="q_size">0</b></span>
                </div>
            </div>

            <div class="controls-section">
                <h2>⚙️ Configuración IA</h2>

                <div class="control-group">
                    <label>Alpha ($\alpha$):</label>
                    <input
                        type="number"
                        id="alpha"
                        value="0.1"
                        step="0.01"
                        onchange="updateParams()"
                    />
                </div>

                <div class="control-group">
                    <label>Gamma ($\gamma$):</label>
                    <input
                        type="number"
                        id="gamma"
                        value="0.99"
                        step="0.01"
                        onchange="updateParams()"
                    />
                </div>

                <div class="control-group">
                    <label>Epsilon ($\epsilon$):</label>
                    <input
                        type="number"
                        id="epsilon"
                        min="0"
                        max="1"
                        step="0.01"
                        value="0.1"
                        onchange="updateParams()"
                    />
                </div>

                <div class="control-group">
                    <label
                        >Velocidad de Juego:
                        <span id="speed_val">1x</span></label
                    >
                    <input
                        type="range"
                        id="game_speed"
                        min="1"
                        max="30"
                        step="1"
                        value="1"
                        oninput="updateSpeed()"
                    />
                </div>

                <hr />

                <div class="control-group">
                    <button
                        id="btn_duel"
                        onclick="toggleDuel()"
                        class="btn-duel"
                    >
                        🎮 Jugar
                    </button>
                    <p style="font-size: 0.8em; color: #888; margin-top: 5px">
                        Usa la <b>Barra Espaciadora</b> para saltar.
                    </p>
                </div>

                <hr />

                <h2>🚀 Modo Turbo</h2>
                <div class="control-group">
                    <input type="number" id="turbo_steps" value="100" />
                    <button onclick="startTurbo()" class="btn-turbo">
                        Ejecutar Ciclo Turbo
                    </button>
                    <p id="turbo_progress">Esperando orden...</p>
                </div>

                <button onclick="resetMemoria()" class="btn-reset">
                    Resetear Memoria
                </button>
            </div>

            <div class="chart-section">
                <canvas id="scoreChart"></canvas>
            </div>

            <div class="heatmap-section">
                <h2>HeatMap(Q-Table)</h2>
                <canvas
                    id="heatCanvas"
                    width="300"
                    height="300"
                    style="background: #111; border-radius: 8px"
                ></canvas>
            </div>
        </div>

        <script>
            const socket = io(); // Definido globalmente una sola vez
        </script>
        <script src="/static/js/api.js"></script>
        <script src="/static/js/canvas.js"></script>
    </body>
</html>
